<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title> Fidget Worm</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;700&display=swap" rel="stylesheet">
</head>
<body>
    <header>
        <div class="logo">
            <alt="Fidget Worm Logo" style="height: 50px; vertical-align: middle;">
            <span style="vertical-align: middle; font-weight: bold;">𝓕𝓲𝓭𝓰𝓮𝓽𝔀𝓸𝓻𝓶</span>
        </div>
        <nav>
            <ul>
                <li><a href="index.html">Home</a></li>
                <li><a href="about.html">About</a></li>
                <li><a href="products.html">Products</a></li>
                <li><a href="contact.html">Contact</a></li>
                <li><a href="basket.html">Basket</a></li>
                <li><a href="login.html">Login</a></li>
            </ul>
        </nav>
    </header>
    <main>
        <section id="contact-section">
            <h2>Contact Us</h2>
            <p>If you have any questions or need further information, please feel free to contact us. We are here to help!</p>
            <form id="contact-form">
                <input type="text" id="name" placeholder="Your Name" required>
                <input type="email" id="email" placeholder="Your Email" required>
                <textarea id="message" placeholder="Your Message" required></textarea>
                <button type="submit">Send Message</button>
            </form>
            <div id="contact-message"></div>
        </section>
        <div id="login-section-container"></div>
    </main>
    <script>
        document.getElementById('contact-form').addEventListener('submit', (event) => {
            event.preventDefault();
            document.getElementById('contact-message').textContent = 'Thank you for your message! We will get back to you soon.';
        });
    </script>
    <script src="scripts/basket.js"></script>
</body>

</html>
